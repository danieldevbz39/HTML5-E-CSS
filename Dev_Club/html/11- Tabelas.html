<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="4" cellpadding="10" bordercolor="blue">
        <tr>
            <th>Tipo</th>
            <th>Valor</th>
            <th>Data</th>
        </tr>

        <tr>
            <td>Alimentação</td>
            <td>R$ 30,00</td>
            <td>10/04/2026</td>
        </tr>

        <tr>
            <td>Diversão</td>
            <td>R$ 48,00</td>
            <td>11/04/2026</td>
        </tr>

        <tr>
            <td>Transporte</td>
            <td>R$ 10,00</td>
            <td>15/04/2026</td>
        </tr>
    </table>
</body>
</html>
