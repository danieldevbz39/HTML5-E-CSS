<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor de moedas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="../04- Conversor de moedas/estilos/style.css"
    />
  </head>

  <body>
    <img
      src="../04- Conversor de moedas/assets/dinheiro.gif"
      alt="logo-convert"
      width="100px"
    />

    <main>
      <label>
        Converter <b>de</b>
        <select>
          <option>R$ Real Brasileiro</option>
        </select>
      </label>

      <label>
        Converter <b>para</b>
        <select>
          <option>U$ Dolar americano</option>
          <option>€ Euro</option>
        </select>
      </label>

      <label>
        Valor
        <input placeholder="R$ 10.000,00" />
      </label>

      <button>Converter</button>

      <section>
        <div>
          <img src="./assets/brasil.png" alt="moeda-real" />
          <p>Real</p>
          <p>R$ 0,00</p>
        </div>

        <img src=".//assets/seta.png" alt="seta" />

        <div>
          <img src="./assets/eua.png" alt="moeda-eua" />
          <p>Dolar</p>
          <p>U$ 0,00</p>
        </div>
      </section>
    </main>
  </body>
</html>
