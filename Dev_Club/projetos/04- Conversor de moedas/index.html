<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor de moedas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../04- Conversor de moedas/estilos/style.css"/>
    

  </head>

  <body>
    <img
      src="../04- Conversor de moedas/assets/dinheiro.gif"
      alt="logo-convert"
      class="logo"
    />

    <main>
      <label>
        Converter <b>de</b>
        <select>
          <option>R$ Real Brasileiro</option>
        </select>
      </label>

      <label>
        Converter <b>para</b>
        <select class="currency-select">
          <option value="dolar">U$ Dolar americano</option>
          <option value="euro">€ Euro</option>
        </select>
      </label>

      <label>
        Valor
        <input class="input-currency" placeholder="R$ 10.000,00" />
      </label>

      <button class="convert-button">Converter</button>

      <section>
        <div class="currency-box">
          <img src="./assets/brasil.png" alt="moeda-real" />
          <p class="currency">Real</p>
          <p class="currency-value-to-convert">R$ 0,00</p>
        </div>

        <img class="arrow-img" src=".//assets/seta.png" alt="seta" />

        <div class="currency-box">
          <img src="./assets/eua.png" alt="moeda-eua" />
          <p class="currency">Dolar</p>
          <p class="currency-value">U$ 0,00</p>
        </div>
      </section>
    </main>

    <script src="./estilos/scripts.js"></script>

  </body>
</html>
