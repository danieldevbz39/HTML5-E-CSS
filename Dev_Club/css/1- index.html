<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        h1 {
            color: red;
        }
        p {
            color: blueviolet;
        }
        button {
            background-color: greenyellow;
            border-color: darkcyan;
            font-size: 6rem;
            width: 100%;
            height: 200px;
            border-radius: 10px 10px 10px 10px;
            box-shadow: 5px 3px 20px 5px rgba(208, 255, 0, 0.493);
        }
        button:hover {
            background-color: black;
            color: greenyellow;
            box-shadow: 5px 3px 20px 5px rgba(0, 0, 0, 0.493);
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <h1>Minha primeira aula de CSS</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Sed quos, facilis nemo in ipsum labore sapiente maxime ipsam vitae quaerat quisquam, ea corrupti quam quod enim quis, natus sit iusto.</p>
    <button>Clique aqui!</button>
</body>
</html>
