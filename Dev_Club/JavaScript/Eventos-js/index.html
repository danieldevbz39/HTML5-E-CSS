<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js- Conectando js no html</title>
    <style>
        h1 {
            color: blue;
        }

        button {
            background: greenyellow;
        }

        #meuParagrafo {
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>
        <h1>JavaScript</h1>

        <input type="text" id="meuCampo" placeholder="Digite aqui">

        <p class="paragraph-js">Começando nossa <b>jornada</b> para aprender</p>
        <p class="paragraph-js">A linguagem de programação</p>

        <button onclick="exibirInformacao()">Exibir texto</button>

        <p id="meuParagrafo">Texto aparecerá aqui</p>

    <script src="./java.js"></script>
</body>
</html>
