<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js- Conectando js no html</title>
    <style>
        h1 {
            color: blue;
        }

        button {
            background: greenyellow;
        }
    </style>
</head>
<body>
        <h1>JavaScript</h1>
        <input onkeypress="digiteiNoInput()" id="main-input" placeholder="Digite aqui" name="nome-completo">
        <p class="paragraph-js">Começando nossa <b>jornada</b> para aprender</p>
        <p class="paragraph-js">A linguagem de programação</p>

        <button onclick="cliqueiNoBotao()" class="main-button paragraph-js">Clique aqui</button>

    <script src="./java.js"></script>
</body>
</html>
