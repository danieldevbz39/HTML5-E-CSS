<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto-pedro-site</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

</head>

<body>
    <div class="fundo">

        <div class="img-mk"><img src="../Projeto-pedro-site 2/img/mk bola.png" alt=""></div>

        <header class="header-main">
            <div class="header-inner">
                <a href="#home" class="logo-link">
                    <img src="../Projeto-pedro-site 2/img/log.png" alt="Logo Pedro Moreira" class="logo-img" />
                </a>
                <button class="menu-toggle" aria-label="Abrir menu de navegação">
                    ☰
                </button>
                <div class="esq"><a href="#campeõesdavida">Campeões da Vida</a></div>
                <nav class="nav-menu" aria-label="Menu principal">
                    <div class="dir">
                        <a href="#deixeseucomentário">Deixe seu comentário</a>
                        <a href="#junte-seanossafamília" class="dest">Junte-se à nossa Família</a>
                    </div>
                </nav>
            </div>
        </header>
        <main>

            <div class="video-container">
                <video controls autoplay muted loop playsinline>
                    <source src="../Projeto-pedro-site 2/img/lutadores.mp4" type="video/mp4">
                    Seu navegador não suporta vídeo HTML5.
                </video>
            </div>

            <div class="caixamae">

                <div class="txt-bot">
                    <h1>CONQUISTE MAIS QUE MEDALHAS. TRANSFORME SUA VIDA.</h1>


                    <div class="containerbtn">
                        <img src="../Projeto-pedro-site 2/img/botao 2.png" alt="Botão">

                        <p>AGENDE SUA AULA EXPERIMENTAL GRATUITA</p>
                    </div>

                </div>

                <div class="img-pedro-lut">
                    <img src="../Projeto-pedro-site 2/img/pedro.png" alt="Imagem Pedro">
                </div>
            </div>
            <div class="group-img">
                <div class="img-lateral-left"><img src="../Projeto-pedro-site 2/img/lateral esquerda parte 1.png" alt="">
                </div>

                <div class="img-lateral-right"><img src="../Projeto-pedro-site 2/img/lateral direita parte 1.png" alt="">
                </div>
            </div>
        </main>

        <sectio class="container-section">
            <div class="section-left">
                <h1>LIDERANDO CAMPEÕES HÁ MAIS DE 11 ANOS</h1>
            </div>

            <div class="section-right">
                <h1>MAIS DE 1.400 VIDAS TRANSFORMADAS</h1>
            </div>
        </section>

    </div>
    
</body>

</html>
