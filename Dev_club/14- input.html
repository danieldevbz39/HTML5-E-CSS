<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input</title>
</head>
<body>

    <label>
        Rua:
        <input autocomplete="street-address"
        placeholder="Digite aqui"        
        />
    </label>

<br>
<br>
    <label for="rua">Rua</label>
    <input id="rua" autofocus/>
    <input type="complemento" autofocus></input>
    <input type="numero" autofocus></input>
    <input type="color" name="" id="rua">
    <input type="range" min="50" max="500" value="200">
    <input type="password">
    <input type="email">
    <label>Você quer molho extra?<input type="checkbox"></label>
    <input type="file"
            multiple
            accept=".mp4">
    <input type="number" autofocus>
    <input type="datetime-local" autofocus>


    <h2>Qual sua rede social favorita?</h2>
    <br>

    <label for="facebook">Facebook</label>
    <input 
            type="radio" id="facebook" name="redes-sociais"/> <br>

    <label for="instagram">Instagram</label>
    <input 
            type="radio" id="instagram" name="redes-sociais"/> <br>

    <label for="youtube">Youtube</label>
    <input 
            type="radio" id="youtube" name="redes-sociais"/> <br>


</body>
</html>
