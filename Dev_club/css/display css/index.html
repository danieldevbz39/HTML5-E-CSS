<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display-Css</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="block">
        <p style="text-align: center;">block</p>
        <h4>1</h4>
        <h4>2</h4>
        <h4>3</h4>
        <h4>4</h4>
    </div>

    <div class="inline">
        <ul>
            <p style="text-align: center;">inline</p>
            <li>a</li>
            <li>b</li>
            <li>c</li>
            <li>d</li>
        </ul>
    </div>

    <div class="inline-block">
        <p style="text-align: center;">inline-block</p>
        <p>a1</p>
        <p>b2</p>
        <p>c3</p>
        <p>d4</p>
    </div>

    <div class="none">
        <p style="text-align: center;">none</p>
        <a href="#">10</a>
        <a href="#">20</a>
        <a href="#">30</a>
        <a href="#">40</a>
    </div> 
</body>
</html>
