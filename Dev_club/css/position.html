<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>

        * {
            margin: 10px 10px 10px 10px;
            padding: 0;
            box-sizing: border-box;
            height: 200vh;
            width: 200vw;
        }
        .pai {
            width: 350px;
            height: 350px;
            background: red;
        }

        .filho {
            width: 150px;
            height: 150px;
            background: orange;
        }

        .objeto {
            width: 50px;
            height: 50px;
            background: green;
        }
        
    </style>
</head>
<body>
    <div class="pai">
        <div class="filho"></div>
    </div>

    <div class="objeto"></div>
</body>
</html>
