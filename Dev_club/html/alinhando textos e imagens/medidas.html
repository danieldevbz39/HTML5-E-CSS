<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        * {
            box-sizing: border-box;
            border-radius: 20px;
        }
        .pr {
            width: 50vw;
            height: 50vh;
            background-color: blue;
            color: white;
            box-shadow: 1px 1px 4px black;
        }

        .s {
            width: 50%;
            background: red;
        }

        .t {
            width: 50%;
            height: 50%;
            background: orange;
        }
        p {
            font-size: 1.5em;
        }


    </style>
</head>
<body>
    <header class="pr"><p>Primeira camada</p>
        <div class="s"><p>Segunda camada</p>
            <div class="t"><p>Terceira camada</p></div>
        </div>
    </header>
        
</body>
</html>
