<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#" class="b1">Olá!</a><br>
    <a href="#" class="b2">aqui!</a><br>
    <a href="#" class="b3">Clickou<br></a>
    <input type="checkbox"><br>
    <input type="checkbox" disabled><br>
    <input> <br>
    <input value="esse texto não pode ser apagado" readonly><br>
    <div class="container">Essa é a div</div><br>
    <div class="container"></div><br>
    <ul>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
        <li>Quarto</li>
        <li>Quinto</li>
        <li>Sexto</li>
        <li>Sétimo</li>
    </ul>
    <div>
        <span>Olá</span>
        <span>Hey</span>
        <p>How</p>
        <p>Let's Go</p>
    </div>
    <ul>
        <li>um</li>
        <li>dois</li>
        <li>três</li>
    </ul>
    <div class="container">
        <span>Quarto</span>
        <span class="esse">Cinco</span>
        <span>Seis</span>
    </div>
    <ul class="obj">
        <li>carro</li>
        <li>bicicleta</li>
        <li>moto</li>
        <li>foguete</li>
    </ul>

</body>
</html>
