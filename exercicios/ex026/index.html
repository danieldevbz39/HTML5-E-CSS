        }

        a {
            text-decoration: none;

            }

            h3 {

            }

                font-size: 0.85em;
            }
            td {
                padding: 7px;
            }
            caption {
                font-size: 1.1em;
                padding: 6px;
            }
        }

        @media (max-width: 480px) {
            h3 {
                margin-left: 0;
                font-size: 1em;
            }
            table {
                font-size: 0.75em;
            }
            td {
                padding: 5px;
            }
            caption {
                font-size: 0.95em;
            }
            a {
                font-size: 0.9em;
            }
        }

        @media (max-width: 320px) {
            body {
                padding: 5px;
            }
            h3 {
                font-size: 0.9em;
                margin-bottom: 15px;
            }
            table {
                font-size: 0.7em;
            }
            td {
                padding: 4px;
            }
        }
    </style>
