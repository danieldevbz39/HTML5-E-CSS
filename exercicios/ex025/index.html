<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carregando exercicios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 10px;
        }

        h3 {
            margin-left: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            text-align: center;
            margin: 0 auto;
        }

        caption {
            font-size: 1.4em;
            font-weight: bold;
            border: 1px solid black;
            padding: 8px;
            background-color: gray;
            color: white;
        }

        td {
            border: 1px solid black;
            padding: 10px;
        }

        a {
            text-decoration: none;
            color: #0066cc;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.9em;
            }

            td {
                padding: 8px;
            }

            caption {
                font-size: 1.2em;
            }
        }

        @media (max-width: 480px) {
            h3 {
                margin-left: 0;
                font-size: 1em;
            }

            table {
                font-size: 0.8em;
            }

            td {
                padding: 6px;
                word-wrap: break-word;
            }

            caption {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

        <caption>Configurações de site</caption>

    </table>

</body>
</html>
