<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carregando exercicios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 10px;
        }
        
        h3 {
            margin-left: 10px;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            text-align: center;
            margin: 0 auto;
        }
        
        caption {
            font-size: 1.4em;
            font-weight: bold;
            border: 1px solid black;
            padding: 8px;
            background-color: gray;
            color: white;
        }
        
        td {
            border: 1px solid black;
            padding: 10px;
        }
        
        td a {
            display: block;
            text-decoration: none;
            color: inherit;
            font-size: clamp(0.9em, 2vw, 1em);
        }
        
        @media (max-width: 480px) {
            table {
                width: 100%;
            }
            
            td {
                padding: 8px;
                font-size: 0.9em;
            }
            
            h3 {
                margin-left: 0;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>

        <tr>

            <td><a href="iframe006.html">Conteúdos dentro de iframes tela</a></td>
        </tr>
    </table>

</body>
</html>
